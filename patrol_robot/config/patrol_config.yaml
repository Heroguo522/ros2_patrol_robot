patrol_node:
  ros__parameters:
    robot_id: "robot_001"
    task_config_dir: ""
    auto_start_task: true
    default_task_name: "industrial_screw_inspection"

    # 机器人初始位姿 (x, y, yaw in radians)
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0

    task_completion_hold_sec: 5.0

    fault_recovery:
      nav_retry_max_attempts: 3
      nav_retry_initial_wait_sec: 3.0
      nav_retry_backoff_factor: 2.0
      nav_timeout_sec: 120.0
      nav_clear_costmap_on_retry: true

      service_wait_timeout_sec: 2.0

      capture_retry_max_attempts: 1
      capture_retry_wait_sec: 2.0
      capture_failure_blocks_task_default: false

      camera_no_image_blocks_task_default: false
      image_stale_timeout_sec: 5.0

      tts_failure_blocks_task: false

    composite_task:
      mock_workpiece_default_state: "ready_for_screw"
      mock_workpiece_station_overrides_json: ""
      mock_arm_motion_delay_sec: 0.5
      mock_arm_fail_station: ""
      mock_arm_fail_screw_index: -1
      mock_tool_delay_sec: 0.5
      mock_tool_torque_noise_nm: 0.05
      mock_tool_fail_station: ""
      mock_tool_fail_screw_index: -1